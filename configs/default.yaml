project_name: oj-problem-generator
base_model: unsloth/Qwen3-8B-unsloth-bnb-4bit
max_seq_length: 2048
train:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  num_train_epochs: 1
  warmup_ratio: 0.03
  weight_decay: 0.01
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  seed: 3407
generation:
  max_new_tokens: 1800
  temperature: 0.8
  top_p: 0.92
  candidates_per_prompt: 5
validation:
  min_description_chars: 80
  max_near_duplicate_cosine: 0.92
  max_title_similarity: 0.85
